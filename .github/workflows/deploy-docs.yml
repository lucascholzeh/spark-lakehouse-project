name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "notebooks/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"
          enable-cache: true

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (docs group)
        run: uv sync --group docs --no-install-project

      - name: Stage notebooks into docs/notebooks
        run: |
          mkdir -p docs/notebooks
          cp notebooks/*.ipynb docs/notebooks/

      - name: Configure git author
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build & deploy MkDocs to gh-pages
        run: |
          uv run mkdocs gh-deploy --force --no-history --message "deploy ${{ github.sha }}"
